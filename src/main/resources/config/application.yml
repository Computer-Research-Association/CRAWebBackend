spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  data:
    page:
      MAX_PER_PAGE: 100
springdoc:
  api-docs:
    path: /api/backend-api-data

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus

jwt:
  refresh-store: redis

site:
  frontend:
    url: https://cra206.org