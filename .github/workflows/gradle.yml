name: CI/CD for cra_web Dev
on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Spring Boot App
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      - name: Setup SSH configuration
        run: |
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          
          # Add SSH keys
          echo "${{ secrets.BASTION_KEY }}" > ~/.ssh/bastion.pem
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/target.pem
          chmod 600 ~/.ssh/bastion.pem ~/.ssh/target.pem
          ssh-add ~/.ssh/bastion.pem
          ssh-add ~/.ssh/target.pem
          
          # Setup known_hosts
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          # Create SSH config
          cat > ~/.ssh/config << 'EOF'
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            User ${{ secrets.BASTION_USER }}
            IdentityFile ~/.ssh/bastion.pem
            ConnectTimeout 10
            ServerAliveInterval 60
            ServerAliveCountMax 3

          Host target
            HostName ${{ secrets.SERVER_HOST }}
            User ${{ secrets.SERVER_USER }}
            Port 2222
            IdentityFile ~/.ssh/target.pem
            ProxyJump bastion
            ConnectTimeout 10
            ServerAliveInterval 60
            ServerAliveCountMax 3
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Test SSH connections
        run: |
          ssh -F ~/.ssh/config -o ConnectTimeout=10 bastion "echo 'Bastion connection successful'"
          ssh -F ~/.ssh/config -o ConnectTimeout=10 target "docker --version"

      - name: Prepare deployment environment
        run: |
          ssh -F ~/.ssh/config target "
            mkdir -p ~/cra_web/build/libs
            if ! docker network inspect cra-network >/dev/null 2>&1; then
              docker network create cra-network
              echo 'Created cra-network'
            fi
          "

      - name: Transfer application JAR
        run: |
          scp -F ~/.ssh/config build/libs/*.jar target:~/cra_web/build/libs/

      - name: Deploy application
        run: |
          ssh -F ~/.ssh/config target "
            set -e
            cd ~/cra_web
            
            echo 'Starting deployment...'
      
            # remove  current container if exists
            if docker ps -a --format '{{.Names}}' | grep -q '^cra_web$'; then
              echo 'Removing current container...'
              docker rm -f cra_web || true
            fi
            
            # Remove old image and build new one
            docker rmi cra_web 2>/dev/null || true
            echo 'Building new Docker image...'
            timeout 600 docker build -t cra_web .
            
            # Run new container with environment variables
            echo 'Starting new container...'
            docker run -d \
              --name cra_web \
              -p 1000:8080 \
              --network cra-network \
              --restart unless-stopped \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              -e LOGGING_LOKI_URL='http://loki:3100' \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e JPA_DDL_AUTO='${{ secrets.JPA_DDL_AUTO }}' \
              -e JPA_SHOW_SQL='${{ secrets.JPA_SHOW_SQL }}' \
              -e REDIS_HOST='${{ secrets.REDIS_HOST }}' \
              -e REDIS_PORT='${{ secrets.REDIS_PORT }}' \
              -e REDIS_TIMEOUT='${{ secrets.REDIS_TIMEOUT }}' \
              -e AWS_ACCESS_KEY='${{ secrets.AWS_ACCESS_KEY }}' \
              -e AWS_SECRET_KEY='${{ secrets.AWS_SECRET_KEY }}' \
              -e AWS_REGION='${{ secrets.AWS_REGION }}' \
              -e AWS_S3_BUCKET='${{ secrets.AWS_S3_BUCKET }}' \
              -e AWS_S3_ENDPOINT='${{ secrets.AWS_S3_ENDPOINT }}' \
              -e MAIL_HOST='${{ secrets.MAIL_HOST }}' \
              -e MAIL_PORT='${{ secrets.MAIL_PORT }}' \
              -e MAIL_USERNAME='${{ secrets.MAIL_USERNAME }}' \
              -e MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e JWT_ACCESS_EXP='${{ secrets.JWT_ACCESS_EXP }}' \
              -e JWT_REFRESH_EXP='${{ secrets.JWT_REFRESH_EXP }}' \
              -e AES_ALGO='${{ secrets.AES_ALGO }}' \
              -e AES_KEY='${{ secrets.AES_KEY }}' \
              -e AES_IV='${{ secrets.AES_IV }}' \
              -e LOG_FILE='${{ secrets.LOG_FILE }}' \
              cra_web
          "
